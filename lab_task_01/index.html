<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Registration Form - Lab Tasl 01 </title>
</head>
<body>
    
    <h1>Registration Form</h1>
    <P>Please fillup the details to get confirmation details about your intern from the university</P>








        <form>

        <table>

            <tr>

                <td>

                    <label for="sName">Student Name</label>
                </td>
                <td>

                     <input type="text" name="sName" id="sName" placeholder="Type your full name" required>
                </td>



            </tr>

            <tr>
                <td>
                    <label for="sEmail">Email Address</label>
                </td>
                <td>
                    <input type="text" id="sEmail" placeholder="Type your email address" required>
                </td>
            </tr>

            <tr>
                <td>
                    <label>Preferred Internship Type</label>
                </td>
            </tr>

            <tr>
                <td><input type="radio" id="onsite"  > <label for="onsite">On-Site</label></td>
                <td><input type="radio" id="remote"  > <label for="remote">Remote</label></td>
            </tr>

           <tr>
                <td> <label for="remote">Internship Duration</label></td>
                <td>       
                    <select>
                        <option value="6w">6 weeks</option>
                        <option value="3m">3 Months</option>


                    </select>
                </td>
           </tr>
           <tr>
            
            <td><label>Skills of interest</label></td>
           </tr>

           <tr>
            <td>
                <input type="checkbox">
                <label>Web Development</label>
                <input type="checkbox">
                <label>Data Analyst</label>
            

            </td>
           </tr>

           <tr>
            <td> <input type="checkbox">
                <label>Mobile Apps</label></td>
           </tr>

           <tr>
            <td><input type="submit" value="Submit"></td>
           </tr>

        </table>




            

            
            
          
            



            









    </form>



</body>
</html>
