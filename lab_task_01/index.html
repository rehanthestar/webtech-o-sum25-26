<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intern Registration Form - Lab Tasl 01 </title>
</head>
<body>
    
    <h1>Registration Form</h1>
    <P>Please fillup the details to get confirmation details about your intern from the university</P>


    <form>



        <label for="sName">Student Name</label>
        <input type="text" name="sName" id="sName" placeholder="Type your full name" required>

        <br>

        <label for="sEmail">Email Address</label>
        <input type="text" id="sEmail" placeholder="Type your email address" required>

        <br>


        <label>Preferred Internship Type</label>

        <br>
        
        <input type="radio" id="onsite"  >
        <label for="onsite">On-Site</label>


         
        <input type="radio" id="remote"  >
        <label for="remote">Remote</label>
        <br>

         <label for="remote">Internship Duration</label>

       <select>
            <option value="6w">6 weeks</option>
            <option value="3m">3 Months</option>


       </select>

       <br>

        <label>Skills of interest</label>
        <br>

        <input type="checkbox">
        <label>Web Development</label>
        <input type="checkbox">
        <label>Data Analyst</label>
        <input type="checkbox">
        <label>Mobile Apps</label>
       <br>

        <input type="submit" value="Submit">









    </form>



</body>
</html>
